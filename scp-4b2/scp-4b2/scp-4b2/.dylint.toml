# Dylint configuration for SCP workspace
# Additional Rust safety lints for migration

[lint."dylint::const_in_const"]
level = "warn"

[lint."dylint::equivalence_assertion"]
level = "warn"

[lint."dylint::extend_from_slice"]
level = "warn"

[lint."dylint::implicit_clone"]
level = "warn"

[lint."dylint::linkage_const"]
level = "warn"

[lint."dylint::manual_strip"]
level = "warn"

[lint."dylint::missing_assert_in_for_loop"]
level = "warn"

[lint."dylint::missing_assert_message"]
level = "warn"

[lint."dylint::needless_borrowed_reference"]
level = "warn"

[lint."dylint::redundant_closure_call"]
level = "warn"

[lint."dylint::semicolon_if_nothing_returned"]
level = "warn"

[lint."dylint::try_err"]
level = "warn"

[lint."dylint::unwrap_used"]
level = "warn"

[lint."dylint::use_self"]
level = "warn"

# Clippy lints via dylint
[lint."clippy::all"]
level = "warn"
